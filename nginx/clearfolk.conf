server {
    listen 80;
    server_name app.clearfolks.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name app.clearfolks.com;

    ssl_certificate /etc/letsencrypt/live/app.clearfolks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.clearfolks.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/clearfolk;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Service worker — must be served from root, no cache
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        expires 0;
    }

    # Manifests — short cache
    location ~* /manifest\.json$ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Icons — cache aggressively
    location /icons/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        expires 1y;
    }

    # ── PWA ROUTES ──────────────────────────────────────────────────────────

    # P0001 — Caregiver Command Center
    location /caregiver {
        alias /var/www/clearfolk/caregiver;
        try_files $uri $uri/ /caregiver/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # P0005 — Medication Tracker
    location /medication-tracker {
        alias /var/www/clearfolk/medication-tracker;
        try_files $uri $uri/ /medication-tracker/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # P0002 — IEP Parent Binder
    location /iep {
        alias /var/www/clearfolk/iep;
        try_files $uri $uri/ /iep/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # P0003 — IEP Meeting Prep Kit
    location /iep-meeting {
        alias /var/www/clearfolk/iep-meeting;
        try_files $uri $uri/ /iep-meeting/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # P0004 — Etsy Seller Business System
    location /etsy-seller {
        alias /var/www/clearfolk/etsy-seller;
        try_files $uri $uri/ /etsy-seller/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }


    # Wedding Planning App
    location /cf-2465sd9i {
        alias /var/www/clearfolk/cf-2465sd9i;
        try_files $uri $uri/ /cf-2465sd9i/index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Default — show product index or redirect to Etsy
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;
}
